# Experiment: Multi-task meta-training on diverse target architectures
# Evaluates meta-generalization across different network types

experiment_name: "multitask_diverse"
seed: 123
device: "cpu"

model:
  node_hidden_dim: 64
  edge_hidden_dim: 64
  gnn_hidden_dim: 128
  num_gnn_layers: 3
  num_mp_rounds: 2
  use_layer_norm: true
  use_per_param_heads: true
  output_scale: 0.001
  use_hidden_state: true
  hidden_state_dim: 32

meta_training:
  meta_lr: 0.001
  num_outer_steps: 2000
  num_inner_steps: 20
  truncation_length: 10
  eval_every: 100
  save_every: 500
  num_eval_tasks: 5
  num_eval_steps: 50

tasks:
  task_names:
    - "quadratic"
    - "mlp_regression"
    - "mlp_classification"
    - "small_cnn"
  task_params:
    quadratic:
      dim: 10
      condition_number: 50.0
    mlp_regression:
      input_dim: 20
      hidden_dim: 64
      output_dim: 1
      num_layers: 3
    mlp_classification:
      input_dim: 20
      hidden_dim: 64
      num_classes: 5
      num_layers: 3
    small_cnn:
      num_classes: 10
      image_size: 16

wandb:
  enabled: true
  project: "graph-metanet-optimizer"
  tags: ["multitask", "diverse", "meta-generalization"]
  notes: "Multi-task training across quadratic, MLP, and CNN tasks"
